<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Confirmed Bookings - SunMoon Resorts</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: #dcdcdc;
            font-family: 'Poppins', sans-serif;
            padding-top: 0;
        }
        .header {
            background-image: url('https://images.unsplash.com/photo-1495365200479-c4ed1d35e1aa?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D');
            background-size: cover;
            background-position: center;
            position: relative;
            width: 100%;
            height: 90px;
            display: flex;
            align-items: center;
            padding: 15px 25px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .header-content {
            background: rgba(255, 255, 255, 0.75);
            border-radius: 12px;
            padding: 6px 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            width: fit-content;
        }
        .header-content h2 {
            white-space: nowrap;
            font-size: 1.8rem;
            margin-bottom: 0;
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            color: #1a472a;
            letter-spacing: 2px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
<!-- Header -->
<div class="header">
    <div class="container-fluid">
        <div class="row g-3 align-items-center">
            <div class="col-md-12">
                <a href="/" style="text-decoration: none; color: inherit;">
                <div class="header-content">
                    <div>
                        <h2 class="mb-0">SUNMOON RESORTS</h2>
                        <p class="mb-0">Where Comfort Meets Royalty</p>
                    </div>
                </div>
                </a>
            </div>
        </div>
    </div>
</div>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Confirmed Bookings</h2>
        <a href="/booking" class="btn btn-primary">New Booking</a>
    </div>

    <div data-th-if="${#lists.isEmpty(bookings)}">
        <div class="alert alert-info">No bookings yet.</div>
    </div>
    <table class="table table-striped" data-th-if="${!#lists.isEmpty(bookings)}">
        <thead>
        <tr>
            <th>Room Number</th>
            <th>Room Type</th>
            <th>Guest Name</th>
            <th>Contact</th>
        </tr>
        </thead>
        <tbody>
        <tr data-th-each="b : ${bookings}">
            <td data-th-text="${b.roomNumber}"></td>
            <td data-th-text="${b.roomType}"></td>
            <td data-th-text="${b.guestName}"></td>
            <td data-th-text="${b.contactNumber}"></td>
        </tr>
        </tbody>
    </table>

</div>
</body>
</html>
