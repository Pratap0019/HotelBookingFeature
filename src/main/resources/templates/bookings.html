<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Confirmed Bookings - SunMoon Resorts</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: #dcdcdc;
            font-family: 'Poppins', sans-serif;
            padding-top: 0;
        }
         .header {
            background-size: cover;
            background-position: center;
            position: relative;
            width: 100%;
            height: 80px; /* increased to fit full logo */
            display: flex;
            align-items: center;
            padding: 10px 0; /* remove left/right padding so logo can start at edge */
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .header-content img {
            /* Fix the logo height to match the header height so it cannot overflow */
            height: 80px; /* match .header height */
            max-height: 80px;
            width: auto;
            max-width: 100%; /* avoid horizontal overflow */
            object-fit: contain;
            display: block;
        }
       .header-center-img {
            width: 100%;           /* span full column width */
            height: 80px;          /* fixed visible height */
            max-height: 80px;
            object-fit: cover;     /* crop to fill without distortion */
            object-position: center; /* center the crop */
            display: block;
        }
        /* Remove bootstrap gutters inside header so logo sits flush to the viewport */
        .header > .container-fluid {
            padding-left: 0;
            padding-right: 0;
        }
        .header .row {
            --bs-gutter-x: 0; /* remove column gutters introduced by .row.g-3 */
        }
        /* Admin button: square white background, 80px height, golden-brown text */
        .admin-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 80px; /* square width */
            height: 80px; /* requested height */
            background: #ffffff; /* white background */
            color: #B8860B; /* golden-brown (dark goldenrod) */
            border: none;
            border-radius: 0; /* square */
            text-decoration: none;
            font-weight: 400;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
            position: relative; /* for the underline pseudo-element */
            font-family: 'Montserrat', 'Poppins', sans-serif; /* minimalist font */
            font-size: 9px; /* reduced font size */
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .admin-btn::after {
            /* small line under the text, same colour */
            content: "";
            position: absolute;
            left: 50%;
            bottom: 25px; /* sits just under the centered text */
            transform: translateX(-50%);
            width: 50%;
            height: 2px;
            background: currentColor; /* same as text colour */
            border-radius: 1px;
            opacity: 0.95;
        }
        .admin-btn:hover {
            text-decoration: none;
            background: #ffffff;
            color: #8b5a05; /* slightly darker on hover */
        }
    </style>
</head>
<body>
<!-- Header -->
<div class="header">
    <div class="container-fluid">
        <div class="row g-3 align-items-center">
            <!-- Left: Logo -->
            <div class="col-auto d-flex align-items-center">
                <a href="/" style="text-decoration: none; color: inherit;">
                    <div class="header-content">
                        <div class="d-flex align-items-center">
                            <img src="/Images/SunMoonLogo.PNG" alt="SunMoon Resorts" class="header-logo">
                        </div>
                    </div>
                </a>
            </div>

            <!-- Center: decorative image placed in the empty space between logo and admin -->
            <div class="col d-flex justify-content-center align-items-center px-0">
                <!-- Reuse an existing image; adjust src if you want a different file -->
                <img src="/Images/Header.jpg" alt="Decoration" class="header-center-img">
            </div>

            <!-- Right: Admin button -->
            <div class="col-auto d-flex justify-content-end align-items-center">
                <a href="/admin/login" class="admin-btn" aria-label="Admin">ADMIN</a>
            </div>
        </div>
    </div>
</div>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Confirmed Bookings</h2>
        <a href="/booking" class="btn btn-primary">New Booking</a>
    </div>

    <div data-th-if="${#lists.isEmpty(bookings)}">
        <div class="alert alert-info">No bookings yet.</div>
    </div>
    <table class="table table-striped" data-th-if="${!#lists.isEmpty(bookings)}">
        <thead>
        <tr>
            <th>Room Number</th>
            <th>Room Type</th>
            <th>Guest Name</th>
            <th>Contact</th>
        </tr>
        </thead>
        <tbody>
        <tr data-th-each="b : ${bookings}">
            <td data-th-text="${b.roomNumber}"></td>
            <td data-th-text="${b.roomType}"></td>
            <td data-th-text="${b.guestName}"></td>
            <td data-th-text="${b.contactNumber}"></td>
        </tr>
        </tbody>
    </table>

</div>
</body>
</html>
