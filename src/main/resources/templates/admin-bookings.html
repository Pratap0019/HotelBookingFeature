<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin - Confirmed Bookings</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: #dcdcdc;
            font-family: 'Poppins', sans-serif;
            padding-top: 0;
        }
         .header {
            background-size: cover;
            background-position: center;
            position: relative;
            width: 100%;
            height: 80px; /* increased to fit full logo */
            display: flex;
            align-items: center;
            padding: 10px 0; /* remove left/right padding so logo can start at edge */
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .header-content img {
            /* Fix the logo height to match the header height so it cannot overflow */
            height: 80px; /* match .header height */
            max-height: 80px;
            width: auto;
            max-width: 100%; /* avoid horizontal overflow */
            object-fit: contain;
            display: block;
        }
        .header-center-img {
            width: 100%;           /* span full column width */
            height: 80px;          /* fixed visible height */
            max-height: 80px;
            object-fit: cover;     /* crop to fill without distortion */
            object-position: center; /* center the crop */
            display: block;
        }
        /* Remove bootstrap gutters inside header so logo sits flush to the viewport */
        .header > .container-fluid {
            padding-left: 0;
            padding-right: 0;
        }
        .header .row {
            --bs-gutter-x: 0; /* remove column gutters introduced by .row.g-3 */
        }
    </style>
</head>
<body>
<!-- Header -->
<div class="header">
    <div class="container-fluid">
        <div class="row g-3 align-items-center">
            <div class="col-auto d-flex align-items-center">
                <a href="/" style="text-decoration: none; color: inherit;">
                <div class="header-content">
                    <div class="d-flex align-items-center">
                        <img src="/Images/SunMoonLogo.PNG" alt="SunMoon Resorts" class="header-logo">
                    </div>
                </div>
                </a>
            </div>
            <div class="col d-flex justify-content-center align-items-center px-0">
                <img src="/Images/Header.jpg" alt="Decoration" class="header-center-img">
            </div>
            <div class="col-auto text-end">
                <!-- admin button intentionally omitted on admin pages -->
            </div>
        </div>
    </div>
</div>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Confirmed Bookings (Admin)</h2>
        <div>
            <a href="/booking" class="btn btn-secondary me-2">New Booking</a>
            <a href="/admin/logout" class="btn btn-outline-danger">Logout</a>
        </div>
    </div>

    <div data-th-if="${#lists.isEmpty(bookings)}">
        <div class="alert alert-info">No bookings yet.</div>
    </div>
    <table class="table table-striped" data-th-if="${!#lists.isEmpty(bookings)}">
        <thead>
        <tr>
            <th>Room Number</th>
            <th>Room Type</th>
            <th>Guest Name</th>
            <th>Contact</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr data-th-each="b : ${bookings}">
            <td data-th-text="${b.roomNumber}"></td>
            <td data-th-text="${b.roomType}"></td>
            <td data-th-text="${b.guestName}"></td>
            <td data-th-text="${b.contactNumber}"></td>
            <td>
                <form data-th-action="@{/admin/cancelBooking}" method="post" style="display:inline-block">
                    <input type="hidden" name="roomNumber" data-th-value="${b.roomNumber}">
                    <button class="btn btn-sm btn-danger" type="submit">Cancel Booking</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

</div>
</body>
</html>
