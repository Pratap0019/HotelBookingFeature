<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin - Confirmed Bookings</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body{padding-top:20px}</style>
</head>
<body>
<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Confirmed Bookings (Admin)</h2>
        <div>
            <a href="/booking" class="btn btn-secondary me-2">New Booking</a>
            <a href="/admin/logout" class="btn btn-outline-danger">Logout</a>
        </div>
    </div>

    <div data-th-if="${#lists.isEmpty(bookings)}">
        <div class="alert alert-info">No bookings yet.</div>
    </div>
    <table class="table table-striped" data-th-if="${!#lists.isEmpty(bookings)}">
        <thead>
        <tr>
            <th>Room Number</th>
            <th>Room Type</th>
            <th>Guest Name</th>
            <th>Contact</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr data-th-each="b : ${bookings}">
            <td data-th-text="${b.roomNumber}"></td>
            <td data-th-text="${b.roomType}"></td>
            <td data-th-text="${b.guestName}"></td>
            <td data-th-text="${b.contactNumber}"></td>
            <td>
                <form data-th-action="@{/admin/cancelBooking}" method="post" style="display:inline-block">
                    <input type="hidden" name="roomNumber" data-th-value="${b.roomNumber}">
                    <button class="btn btn-sm btn-danger" type="submit">Cancel Booking</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

</div>
</body>
</html>
