<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Booking - SunMoon Resorts</title>
    <!-- Favicons and bookmark icons: place your generated favicon files into src/main/resources/Images
         and they'll be served at /Images/... because of WebConfig resource mapping.
         Use multiple sizes/formats so browsers and mobile bookmarks pick the appropriate one. -->
    <link th:href="@{/Images/favicon.ico}" rel="icon" type="image/x-icon" />
    <link th:href="@{/Images/favicon-32x32.png}" rel="icon" sizes="32x32" type="image/png" />
    <link th:href="@{/Images/favicon-16x16.png}" rel="icon" sizes="16x16" type="image/png" />
    <link th:href="@{/Images/apple-touch-icon.png}" rel="apple-touch-icon" sizes="180x180" />
    <link th:href="@{/Images/site.webmanifest}" rel="manifest" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: #dcdcdc;
            font-family: 'Poppins', sans-serif;
            padding-top: 0;
        }
        .card {
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
         .header {
            background-size: cover;
            background-position: center;
            position: relative;
            width: 100%;
            height: 80px; /* increased to fit full logo */
            display: flex;
            align-items: center;
            padding: 10px 0; /* remove left/right padding so logo can start at edge */
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .header-content img {
            /* Fix the logo height to match the header height so it cannot overflow */
            height: 80px; /* match .header height */
            max-height: 80px;
            width: auto;
            max-width: 100%; /* avoid horizontal overflow */
            object-fit: contain;
            display: block;
        }
        .header-center-img {
            width: 100%;           /* span full column width */
            height: 80px;          /* fixed visible height */
            max-height: 80px;
            object-fit: cover;     /* crop to fill without distortion */
            object-position: center; /* center the crop */
            display: block;
        }
        /* Remove bootstrap gutters inside header so logo sits flush to the viewport */
        .header > .container-fluid {
            padding-left: 0;
            padding-right: 0;
        }
        .header .row {
            --bs-gutter-x: 0; /* remove column gutters introduced by .row.g-3 */
        }
        /* Admin button: square white background, 80px height, golden-brown text */
        .admin-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 80px; /* square width */
            height: 80px; /* requested height */
            background: #ffffff; /* white background */
            color: #B8860B; /* golden-brown (dark goldenrod) */
            border: none;
            border-radius: 0; /* square */
            text-decoration: none;
            font-weight: 400;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
            position: relative; /* for the underline pseudo-element */
            font-family: 'Montserrat', 'Poppins', sans-serif; /* minimalist font */
            font-size: 9px; /* reduced font size */
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .admin-btn::after {
            /* small line under the text, same colour */
            content: "";
            position: absolute;
            left: 50%;
            bottom: 25px; /* sits just under the centered text */
            transform: translateX(-50%);
            width: 50%;
            height: 2px;
            background: currentColor; /* same as text colour */
            border-radius: 1px;
            opacity: 0.95;
        }
        .admin-btn:hover {
            text-decoration: none;
            background: #ffffff;
            color: #8b5a05; /* slightly darker on hover */
        }

        /* Match homepage primary button palette */
        .btn-primary {
            background-color: #B8860B;
            border-color: #B8860B;
        }
        .btn-primary:hover,
        .btn-primary:focus,
        .btn-primary:active {
            background-color: #8b5a05;
            border-color: #8b5a05;
        }

        /* Stylish booking page title */
        .booking-title {
            font-family: 'Cinzel', serif;
            color: #B8860B;
            letter-spacing: 0.8px;
            font-weight: 700;
        }

        /* Gap between fixed header block and booking content */
        .booking-container {
            margin-top: 24px;
        }
    </style>
</head>
<body>
<!-- Header -->
<div class="header">
    <div class="container-fluid">
        <div class="row g-3 align-items-center">
            <!-- Left: Logo -->
            <div class="col-auto d-flex align-items-center">
                <a href="/" style="text-decoration: none; color: inherit;">
                    <div class="header-content">
                        <div class="d-flex align-items-center">
                            <img src="/Images/SunMoonLogo.PNG" alt="SunMoon Resorts" class="header-logo">
                        </div>
                    </div>
                </a>
            </div>

            <!-- Center: decorative image placed in the empty space between logo and admin -->
            <div class="col d-flex justify-content-center align-items-center px-0">
                <!-- Reuse an existing image; adjust src if you want a different file -->
                <img src="/Images/Header.jpg" alt="Decoration" class="header-center-img">
            </div>

            <!-- Right: Admin button -->
            <div class="col-auto d-flex justify-content-end align-items-center">
                <a href="/admin/login" class="admin-btn" aria-label="Admin">ADMIN</a>
            </div>
        </div>
    </div>
</div>
<div class="booking-container container">
    <h2 class="text-center mb-4 booking-title">Book Your Stay</h2>
    <!-- View bookings moved to admin area -->

    <!-- Booking Form -->
    <div class="card p-4">
        <form action="/calculatePrice" method="post">

            <!-- Room Number -->
            <div class="mb-3">
                <label class="form-label" for="roomNumberSelect">Room Number</label>
                <select id="roomNumberSelect" class="form-select" name="roomNumber" required>
                    <option value="" disabled selected>Select Room</option>
                    <option data-th-each="room : ${rooms}"
                            data-th-if="${!room.booked}"
                            data-th-value="${room.roomNumber}"
                            data-th-text="'Room ' + ${room.roomNumber} + ' (' + ${room.roomType} + ')'">
                    </option>
                </select>
            </div>

            <!-- Check-in & Check-out -->
            <div class="row mb-3">
                    <div class="col">
                    <label class="form-label" for="checkIn">Check-in Date</label>
                    <input type="date" id="checkIn" class="form-control" required>
                </div>
                <div class="col">
                    <label class="form-label" for="checkOut">Check-out Date</label>
                    <input type="date" id="checkOut" class="form-control" required>
                </div>
            </div>

            <!-- Days Stayed -->
            <div class="mb-3">
                <label class="form-label" for="daysStayed">Days Stayed</label>
                <input type="number" id="daysStayed" name="daysStayed" class="form-control" readonly required>
            </div>

            <!-- Extras -->
            <div class="mb-3">
                <label class="form-label">Extras</label>
                <div class="form-check" data-th-each="extra : ${extrasRate}">
                    <!-- SPA checkbox variant -->
                    <div data-th-if="${extra.key.name() == 'SPA'}">
                        <input class="form-check-input extra-checkbox" type="checkbox" name="extras"
                               data-th-value="${extra.key}" data-th-id="${'extra-' + extra.key}">
                        <label class="form-check-label" data-th-for="${'extra-' + extra.key}"
                               data-th-text="${extra.key} + ' (' + ${extra.value} + ' ₹/session)'"></label>
                    </div>
                    <!-- Other extras (per day) -->
                    <div data-th-unless="${extra.key.name() == 'SPA'}">
                        <input class="form-check-input extra-checkbox" type="checkbox" name="extras"
                               data-th-value="${extra.key}" data-th-id="${'extra-' + extra.key}">
                        <label class="form-check-label" data-th-for="${'extra-' + extra.key}"
                               data-th-text="${extra.key} + ' (' + ${extra.value} + ' ₹/day)'"></label>
                    </div>
                </div>

                <!-- SPA sessions selector (1-3 sessions). Shown only when SPA is selected -->
                <div id="spa-sessions" class="mt-2" style="display:none;">
                        <label class="form-label" for="spaSessions">Spa Sessions</label>
                            <select class="form-select" name="spaSessions" id="spaSessions">
                        <option value="1">1 session</option>
                        <option value="2">2 sessions</option>
                        <option value="3">3 sessions</option>
                    </select>
                </div>
            </div>

            <!-- Pet Weight -->
            <div class="mb-3">
                <label class="form-label">Pet Weight (kg)</label>
                <input type="number" step="0.1" class="form-control" name="petWeight" placeholder="Optional">
            </div>

            <!-- Calculate Price Button -->
            <div class="text-center">
                <button type="submit" class="btn btn-primary btn-lg">Calculate Price</button>
            </div>
        </form>
    </div>

    <!-- Price Breakdown -->
    <div data-th-if="${bill}" class="card mt-4 p-4">
        <h4>Price Breakdown</h4>
        <table class="table table-bordered">
            <thead class="table-dark">
            <tr>
                <th>Item</th>
                <th>Charge (₹)</th>
            </tr>
            </thead>
            <tbody>
            <tr data-th-each="entry : ${bill.breakdown}">
                <td data-th-text="${entry.key}"></td>
                <td data-th-text="${entry.value}"></td>
            </tr>
            <tr class="table-success">
                <td><strong>Total</strong></td>
                <td><strong data-th-text="${bill.getTotalAmount}"></strong></td>
            </tr>
            </tbody>
        </table>

        <!-- Confirm Booking Form -->
        <form action="/confirmBooking" method="post" class="text-center mt-3">
            <!-- Use model attributes instead of bill -->
            <input type="hidden" name="roomNumber" data-th-value="${roomNumber}">
            <input type="hidden" name="daysStayed" data-th-value="${daysStayed}">
            <input type="hidden" name="totalAmount" data-th-value="${bill.totalAmount}">

            <div class="row g-2 mb-3">
                <div class="col-md-6">
                    <label class="form-label">Full Name</label>
                    <input type="text" name="guestName" class="form-control" placeholder="Guest full name" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Contact Number (with country code)</label>
                    <input type="tel" name="contactNumber" class="form-control" placeholder="+91-9876543210" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-lg">Confirm Booking</button>
        </form>
    </div>

    <!-- Success Message -->
    <div th:if="${successMessage}" class="alert alert-success mt-4 text-center" role="alert">
        <span th:text="${successMessage}"></span>
    </div>


    </div>
    <!-- JS to calculate days between dates -->
<script>
    const checkIn = document.getElementById("checkIn");
    const checkOut = document.getElementById("checkOut");
    const daysStayed = document.getElementById("daysStayed");

    function calculateDays() {
        if (checkIn.value && checkOut.value) {
            const inDate = new Date(checkIn.value);
            const outDate = new Date(checkOut.value);
            const diffTime = outDate - inDate;
            const diffDays = diffTime / (1000 * 60 * 60 * 24);
            daysStayed.value = diffDays > 0 ? diffDays : 0;
        }
    }

    checkIn.addEventListener("change", calculateDays);
    checkOut.addEventListener("change", calculateDays);

    // Show/hide spa sessions selector when SPA checkbox is toggled
    const spaCheckbox = document.querySelector("input.extra-checkbox[value='SPA']");
    const spaContainer = document.getElementById('spa-sessions');
    if (spaCheckbox) {
        spaCheckbox.addEventListener('change', function() {
            if (this.checked) spaContainer.style.display = 'block';
            else spaContainer.style.display = 'none';
        });
    }
</script>
</body>
</html>
